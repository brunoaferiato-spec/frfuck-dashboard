version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: frifuck_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: frifuck_db
      MYSQL_USER: frifuck_user
      MYSQL_PASSWORD: frifuck_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: frifuck_app
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://frifuck_user:frifuck_pass@mysql:3306/frifuck_db
      PORT: 3000
      JWT_SECRET: dev-secret-key-change-in-production
      VITE_APP_ID: frifuck-app
      OAUTH_SERVER_URL: http://localhost:3000
      OWNER_OPEN_ID: owner-123
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm dev

volumes:
  mysql_data:
